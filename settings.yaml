### LLM settings ###

completion_models:
  default_completion_model:
    model_provider: azure
    model: ${GRAPHRAG_COMPLETION_MODEL}
    deployment_name: ${GRAPHRAG_COMPLETION_DEPLOYMENT_NAME}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: azure
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    deployment_name: ${GRAPHRAG_EMBEDDING_DEPLOYMENT_NAME}
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff

### Document processing settings ###

input:
  type: text

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

### Storage settings ###

input_storage:
  type: blob
  connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
  container_name: ${GRAPHRAG_BLOB_CONTAINER_INPUT}

output_storage:
  type: blob
  connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
  container_name: ${GRAPHRAG_BLOB_CONTAINER_OUTPUT}

reporting:
  type: blob
  connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
  account_url: ${AZURE_STORAGE_ACCOUNT_URL}
  container_name: ${GRAPHRAG_BLOB_CONTAINER_LOGS}

cache:
  type: json
  storage:
    type: cosmosdb
    connection_string: ${AZURE_COSMOSDB_CONNECTION_STRING}
    container_name: ${GRAPHRAG_BLOB_CONTAINER_CACHE}
    database_name: ${GRAPHRAG_COSMOSDB_DATABASE}

### Vector store settings ###

vector_store:
  type: azure_ai_search
  url: ${AZURE_SEARCH_URL}
  api_key: ${AZURE_SEARCH_API_KEY}

### Workflow settings ###

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [organization,person,geo,event]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Query settings ###

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
