### This config file contains required core defaults that must be set, along with a handful of common optional settings.
### For a full list of available settings, see https://microsoft.github.io/graphrag/config/yaml/

### LLM settings ###

completion_models:
  default_completion_model:
    model_provider: azure # or openai
    model: ${GRAPHRAG_COMPLETION_MODEL}
    deployment_name: ${GRAPHRAG_COMPLETION_DEPLOYMENT_NAME}
    
    # ----- ローカル環境 / Azure 環境（API キー認証） -----
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    
    # ----- Azure 環境（マネージド ID 認証） -----
    # auth_method: azure_managed_identity
    
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: azure # or openai
    model: ${GRAPHRAG_EMBEDDING_MODEL}
    deployment_name: ${GRAPHRAG_EMBEDDING_DEPLOYMENT_NAME}
    
    # ----- ローカル環境 / Azure 環境（API キー認証） -----
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    
    # ----- Azure 環境（マネージド ID 認証） -----
    # auth_method: azure_managed_identity
    
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff

### Document processing settings ###

input:
  type: text # [csv, text, json, jsonl]

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

