### This config file contains required core defaults that must be set, along with a handful of common optional settings.
### For a full list of available settings, see https://microsoft.github.io/graphrag/config/yaml/

### LLM settings ###
## There are a number of settings to tune the threading and token limits for LLM calls - check the docs.

completion_models:
  default_completion_model:
    model_provider: azure # or openai
    model: gpt-4.1
    deployment_name: gpt-4.1
    # ----- ローカル環境 -----
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY} # set this in the generated .env file, or remove if managed identity
    # ----- Azure 環境（マネージド ID を使う場合） -----
    # auth_method: azure_managed_identity
    # api_key フィールドを削除し、代わりに az login またはマネージド ID を使用
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff

embedding_models:
  default_embedding_model:
    model_provider: azure # or openai
    model: text-embedding-3-large
    deployment_name: text-embedding-3-large
    # ----- ローカル環境 -----
    auth_method: api_key
    api_key: ${GRAPHRAG_API_KEY}
    # ----- Azure 環境（マネージド ID を使う場合） -----
    # auth_method: azure_managed_identity
    api_base: ${GRAPHRAG_API_BASE}
    retry:
      type: exponential_backoff

### Document processing settings ###

input:
  type: text # [csv, text, json, jsonl]

chunking:
  type: tokens
  size: 1200
  overlap: 100
  encoding_model: o200k_base

### Storage settings ###
## ローカル環境では type: file を使います。
## Azure 環境では下記コメントを参考に type: blob または type: cosmosdb へ切り替えてください。
## blob を使う場合は connection_string（または account_url）と container_name が必要です。
## cosmosdb を使う場合は connection_string、container_name、database_name が必要です。

input_storage:
  # ----- ローカル環境 -----
  type: file # [file, blob, cosmosdb]
  base_dir: "input"
  # ----- Azure 環境（Blob Storage を使う場合） -----
  # type: blob
  # connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
  # container_name: graphrag-input
  # account_url: https://<storageaccount>.blob.core.windows.net  # マネージド ID 使用時
  # ----- Azure 環境（CosmosDB を使う場合） -----
  # type: cosmosdb
  # connection_string: ${COSMOSDB_CONNECTION_STRING}
  # container_name: graphrag-input
  # database_name: graphrag

output_storage:
  # ----- ローカル環境 -----
  type: file # [file, blob, cosmosdb]
  base_dir: "output"
  # ----- Azure 環境（Blob Storage を使う場合） -----
  # type: blob
  # connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
  # container_name: graphrag-output
  # account_url: https://<storageaccount>.blob.core.windows.net  # マネージド ID 使用時
  # ----- Azure 環境（CosmosDB を使う場合） -----
  # type: cosmosdb
  # connection_string: ${COSMOSDB_CONNECTION_STRING}
  # container_name: graphrag-output
  # database_name: graphrag

reporting:
  # ----- ローカル環境 -----
  type: file # [file, blob]
  base_dir: "logs"
  # ----- Azure 環境（Blob Storage を使う場合） -----
  # type: blob
  # connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
  # container_name: graphrag-logs
  # account_url: https://<storageaccount>.blob.core.windows.net  # マネージド ID 使用時

cache:
  type: json # [json, memory, none]
  storage:
    # ----- ローカル環境 -----
    type: file # [file, blob, cosmosdb]
    base_dir: "cache"
    # ----- Azure 環境（Blob Storage を使う場合） -----
    # type: blob
    # connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
    # container_name: graphrag-cache
    # account_url: https://<storageaccount>.blob.core.windows.net  # マネージド ID 使用時
    # ----- Azure 環境（CosmosDB を使う場合） -----
    # type: cosmosdb
    # connection_string: ${COSMOSDB_CONNECTION_STRING}
    # container_name: graphrag-cache
    # database_name: graphrag

### Vector store settings ###
## ローカル環境では type: lancedb を使います。
## Azure 環境では type: azure_ai_search または type: cosmosdb へ切り替えてください。
vector_store:
  # ----- ローカル環境 -----
  type: lancedb
  db_uri: output/lancedb
  # ----- Azure 環境（Azure AI Search を使う場合） -----
  # type: azure_ai_search
  # url: https://<searchservice>.search.windows.net
  # api_key: ${AZURE_SEARCH_API_KEY}            # 任意: マネージド ID 使用時は不要
  # audience: https://search.azure.com          # 任意: マネージド ID トークンの audience
  # ----- Azure 環境（CosmosDB ベクトルストアを使う場合） -----
  # type: cosmosdb
  # url: https://<account>.documents.azure.com
  # connection_string: ${COSMOSDB_CONNECTION_STRING}
  # database_name: graphrag

### Workflow settings ###

embed_text:
  embedding_model_id: default_embedding_model

extract_graph:
  completion_model_id: default_completion_model
  prompt: "prompts/extract_graph.txt"
  entity_types: [organization,person,geo,event]
  max_gleanings: 1

summarize_descriptions:
  completion_model_id: default_completion_model
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 500

extract_graph_nlp:
  text_analyzer:
    extractor_type: regex_english # [regex_english, syntactic_parser, cfg]

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false
  completion_model_id: default_completion_model
  prompt: "prompts/extract_claims.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 1

community_reports:
  completion_model_id: default_completion_model
  graph_prompt: "prompts/community_report_graph.txt"
  text_prompt: "prompts/community_report_text.txt"
  max_length: 2000
  max_input_length: 8000

snapshots:
  graphml: false
  embeddings: false

### Query settings ###
## The prompt locations are required here, but each search method has a number of optional knobs that can be tuned.
## See the config docs: https://microsoft.github.io/graphrag/config/yaml/#query

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/local_search_system_prompt.txt"

global_search:
  completion_model_id: default_completion_model
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/drift_search_system_prompt.txt"
  reduce_prompt: "prompts/drift_search_reduce_prompt.txt"

basic_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  prompt: "prompts/basic_search_system_prompt.txt"
