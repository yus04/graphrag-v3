# GraphRAG インデックス定期実行ワークフロー
#
# このワークフローは GraphRAG CLI を使ってグラフデータベースを構築・更新します。
# スケジュール実行（毎週日曜 JST 00:00 / UTC 土曜 15:00）と手動トリガーの両方に対応しています。
#
# ■ インデックス作成方法の自動判定（method: auto）
#   Azure Blob Storage 上の entities.parquet の存在を az storage blob exists で確認し、
#   - ファイルが存在する場合 → update（差分更新）
#   - ファイルが存在しない場合 → index（フル構築）
#   を自動で選択します。
#
# ■ ストレージ設計
#   settings.yaml で output_storage / vector_store / cache をすべて Azure サービス
#   （Blob Storage / Azure AI Search / CosmosDB）に向けているため、GraphRAG の実行結果は
#   直接 Azure に書き込まれます。GitHub Actions のローカルディスクには成果物は残りません。
#   したがって actions/cache による永続化は不要です。
#
# 必要な GitHub Secrets:
#   GRAPHRAG_API_KEY                    - Azure OpenAI または OpenAI の API キー
#   GRAPHRAG_API_BASE                   - Azure OpenAI エンドポイント URL
#                                         例: https://<instance>.openai.azure.com
#   GRAPHRAG_COMPLETION_MODEL           - 補完モデル名
#   GRAPHRAG_COMPLETION_DEPLOYMENT_NAME - 補完モデルのデプロイ名
#   GRAPHRAG_EMBEDDING_MODEL            - 埋め込みモデル名
#   GRAPHRAG_EMBEDDING_DEPLOYMENT_NAME  - 埋め込みモデルのデプロイ名
#   AZURE_STORAGE_CONNECTION_STRING     - Azure Storage 接続文字列
#   GRAPHRAG_BLOB_CONTAINER_INPUT       - 入力用 Blob コンテナ名
#   GRAPHRAG_BLOB_CONTAINER_OUTPUT      - 出力用 Blob コンテナ名（index 有無の判定にも使用）
#   GRAPHRAG_BLOB_CONTAINER_LOGS        - ログ用 Blob コンテナ名
#   COSMOSDB_CONNECTION_STRING          - CosmosDB 接続文字列（キャッシュ用）
#   GRAPHRAG_COSMOSDB_DATABASE          - CosmosDB データベース名
#   AZURE_SEARCH_URL                    - Azure AI Search エンドポイント URL
#   AZURE_SEARCH_API_KEY                - Azure AI Search API キー
#
# Azure マネージド ID / OIDC フェデレーション認証を使う場合は以下の Secrets が必要です:
#   AZURE_CLIENT_ID         - サービスプリンシパルまたはマネージド ID のクライアント ID
#   AZURE_TENANT_ID         - Azure テナント ID
#   AZURE_SUBSCRIPTION_ID   - Azure サブスクリプション ID

name: GraphRAG Index

on:
  # スケジュール実行: 毎週日曜 JST 00:00（UTC 土曜 15:00）
  schedule:
    - cron: "0 15 * * 6"

  # 手動トリガー: GitHub Actions UI から実行可能
  workflow_dispatch:
    inputs:
      method:
        description: "インデックス作成方法（auto = インデックスの有無を自動判定）"
        required: false
        default: "auto"
        type: choice
        options:
          - auto              # インデックスの有無を自動判定（推奨）
          - standard          # フルビルド: graphrag index --method standard
          - fast              # フルビルド高速版: graphrag index --method fast
          - update-standard   # 差分更新: graphrag update --method standard
          - update-fast       # 差分更新高速版: graphrag update --method fast
      verbose:
        description: "詳細ログを出力する"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  # Azure OIDC 認証を使う場合は以下を有効化してください
  # id-token: write

jobs:
  graphrag-index:
    name: Build GraphRAG Index
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────
      # 1. ソースコードのチェックアウト
      # ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. Python 環境のセットアップ
      # ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ──────────────────────────────────────────────
      # 3. uv のインストール
      # ──────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # ──────────────────────────────────────────────
      # 4. 依存パッケージのインストール（テスト用 dev グループを含む）
      # ──────────────────────────────────────────────
      - name: Install dependencies
        run: uv sync

      # ──────────────────────────────────────────────
      # 5. ユニットテストの実行
      #    インデックスも Azure 認証情報も不要なテストをインデックス作成前に実行します。
      #    コードの構造・設定・エントリーポイントの正常性を検証します。
      # ──────────────────────────────────────────────
      - name: Run unit tests
        run: uv run pytest tests/test_server.py -v

      # ──────────────────────────────────────────────
      # 6. インデックスの存在確認とコマンドの自動選択
      #
      #    【重要】GraphRAG のサブコマンドの使い分け
      #      graphrag index  → is_update_run=False: previous_table_provider が設定されない
      #      graphrag update → is_update_run=True : previous_table_provider が設定される
      #    差分更新ワークフロー (load_update_documents 等) は previous_table_provider
      #    が必須なので、必ず graphrag update で実行しなければなりません。
      #    graphrag index --method standard-update とすると
      #    "previous_table_provider is required" エラーになります。
      #
      #    settings.yaml の output_storage が Azure Blob Storage であるため、
      #    ローカルに output/entities.parquet は生成されません。
      #    代わりに az storage blob exists で Blob Storage 上のファイルを確認します。
      #    method が "auto" またはスケジュール実行の場合に自動判定が適用されます。
      # ──────────────────────────────────────────────
      - name: Detect existing index and resolve method
        id: resolve-method
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          GRAPHRAG_BLOB_CONTAINER_OUTPUT: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_OUTPUT }}
        run: |
          REQUESTED="${{ github.event.inputs.method || 'auto' }}"

          BLOB_EXISTS=$(az storage blob exists \
            --connection-string "$AZURE_STORAGE_CONNECTION_STRING" \
            --container-name "$GRAPHRAG_BLOB_CONTAINER_OUTPUT" \
            --name "entities.parquet" \
            --query exists \
            --output tsv 2>/dev/null || echo "false")

          if [[ "$BLOB_EXISTS" == "true" ]]; then
            echo "INDEX_EXISTS=true" >> "$GITHUB_ENV"
            echo "既存のインデックスが見つかりました (Blob: ${GRAPHRAG_BLOB_CONTAINER_OUTPUT}/entities.parquet)"
            # 差分更新: graphrag update --method standard を使う
            AUTO_SUBCMD="update"
            AUTO_BASE_METHOD="standard"
          else
            echo "INDEX_EXISTS=false" >> "$GITHUB_ENV"
            echo "既存のインデックスは見つかりませんでした。フルビルドを実行します。"
            # フルビルド: graphrag index --method standard を使う
            AUTO_SUBCMD="index"
            AUTO_BASE_METHOD="standard"
          fi

          if [[ "$REQUESTED" == "auto" ]]; then
            SUBCMD="$AUTO_SUBCMD"
            BASE_METHOD="$AUTO_BASE_METHOD"
          elif [[ "$REQUESTED" == update-* ]]; then
            # update-standard / update-fast → graphrag update --method {standard|fast}
            SUBCMD="update"
            BASE_METHOD="${REQUESTED#update-}"
          else
            # standard / fast → graphrag index --method {standard|fast}
            SUBCMD="index"
            BASE_METHOD="$REQUESTED"
          fi

          echo "GRAPHRAG_SUBCMD=${SUBCMD}" >> "$GITHUB_ENV"
          echo "GRAPHRAG_METHOD=${BASE_METHOD}" >> "$GITHUB_ENV"
          echo "サブコマンド: ${SUBCMD}, ベースメソッド: ${BASE_METHOD}"

      # ──────────────────────────────────────────────
      # 7. Azure へのログイン（OIDC フェデレーション認証 – 任意）
      #    settings.yaml で auth_method: azure_managed_identity を使う場合に有効化
      # ──────────────────────────────────────────────
      # - name: Azure Login (OIDC)
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ──────────────────────────────────────────────
      # 8. GraphRAG インデックス作成
      #    フルビルド  : uv run graphrag index  --root . --method {standard|fast}
      #    差分更新    : uv run graphrag update --root . --method {standard|fast}
      #    成果物は settings.yaml の output_storage / vector_store / cache 設定に従い
      #    Azure Blob Storage / Azure AI Search / CosmosDB へ直接書き込まれます。
      # ──────────────────────────────────────────────
      - name: Run GraphRAG index
        env:
          # --- API credentials ---
          GRAPHRAG_API_KEY: ${{ secrets.GRAPHRAG_API_KEY || '' }}
          GRAPHRAG_API_BASE: ${{ secrets.GRAPHRAG_API_BASE || '' }}
          # --- Completion model ---
          GRAPHRAG_COMPLETION_MODEL: ${{ secrets.GRAPHRAG_COMPLETION_MODEL || 'gpt-4.1' }}
          GRAPHRAG_COMPLETION_DEPLOYMENT_NAME: ${{ secrets.GRAPHRAG_COMPLETION_DEPLOYMENT_NAME || 'gpt-4.1' }}
          # --- Embedding model ---
          GRAPHRAG_EMBEDDING_MODEL: ${{ secrets.GRAPHRAG_EMBEDDING_MODEL || 'text-embedding-3-large' }}
          GRAPHRAG_EMBEDDING_DEPLOYMENT_NAME: ${{ secrets.GRAPHRAG_EMBEDDING_DEPLOYMENT_NAME || 'text-embedding-3-large' }}
          # --- Local storage paths ---
          GRAPHRAG_INPUT_BASE_DIR: ${{ secrets.GRAPHRAG_INPUT_BASE_DIR || 'input' }}
          GRAPHRAG_OUTPUT_BASE_DIR: ${{ secrets.GRAPHRAG_OUTPUT_BASE_DIR || 'output' }}
          GRAPHRAG_LOGS_BASE_DIR: ${{ secrets.GRAPHRAG_LOGS_BASE_DIR || 'logs' }}
          GRAPHRAG_CACHE_BASE_DIR: ${{ secrets.GRAPHRAG_CACHE_BASE_DIR || 'cache' }}
          GRAPHRAG_LANCEDB_URI: ${{ secrets.GRAPHRAG_LANCEDB_URI || 'output/lancedb' }}
          # --- Azure Blob Storage ---
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING || '' }}
          AZURE_STORAGE_ACCOUNT_URL: ${{ secrets.AZURE_STORAGE_ACCOUNT_URL || '' }}
          GRAPHRAG_BLOB_CONTAINER_INPUT: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_INPUT || 'graphrag-input' }}
          GRAPHRAG_BLOB_CONTAINER_OUTPUT: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_OUTPUT || 'graphrag-output' }}
          GRAPHRAG_BLOB_CONTAINER_LOGS: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_LOGS || 'graphrag-logs' }}
          GRAPHRAG_BLOB_CONTAINER_CACHE: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_CACHE || 'graphrag-cache' }}
          # --- Azure CosmosDB ---
          COSMOSDB_CONNECTION_STRING: ${{ secrets.COSMOSDB_CONNECTION_STRING || '' }}
          COSMOSDB_URL: ${{ secrets.COSMOSDB_URL || '' }}
          COSMOSDB_ACCOUNT_URL: ${{ secrets.COSMOSDB_ACCOUNT_URL || '' }}
          GRAPHRAG_COSMOSDB_DATABASE: ${{ secrets.GRAPHRAG_COSMOSDB_DATABASE || 'graphrag' }}
          # --- Azure AI Search ---
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY || '' }}
          AZURE_SEARCH_URL: ${{ secrets.AZURE_SEARCH_URL || '' }}
          AZURE_SEARCH_AUDIENCE: ${{ secrets.AZURE_SEARCH_AUDIENCE || 'https://search.azure.com' }}
        run: |
          VERBOSE_FLAG=""
          if [[ "${{ github.event.inputs.verbose }}" == "true" ]]; then
            VERBOSE_FLAG="--verbose"
          fi

          echo "=== GraphRAG インデックス作成を開始します ==="
          echo "サブコマンド: ${GRAPHRAG_SUBCMD}"
          echo "ベースメソッド: ${GRAPHRAG_METHOD}"
          echo "既存インデックス: ${INDEX_EXISTS}"
          echo "ルートディレクトリ: ."

          uv run graphrag "${GRAPHRAG_SUBCMD}" \
            --root . \
            --method "${GRAPHRAG_METHOD}" \
            ${VERBOSE_FLAG}

          echo "=== インデックス作成が完了しました ==="

      # ──────────────────────────────────────────────
      # 9. 統合テストの実行
      #    MCP サーバーを stdio サブプロセスとして起動し、接続・ツール一覧を検証します。
      #    output/entities.parquet がローカルに存在しないため、インデックスを使った
      #    検索テスト（@skip_if_no_index）は自動的にスキップされます。
      # ──────────────────────────────────────────────
      - name: Run integration tests
        if: success()
        env:
          # --- API credentials ---
          GRAPHRAG_API_KEY: ${{ secrets.GRAPHRAG_API_KEY || '' }}
          GRAPHRAG_API_BASE: ${{ secrets.GRAPHRAG_API_BASE || '' }}
          # --- Completion model ---
          GRAPHRAG_COMPLETION_MODEL: ${{ secrets.GRAPHRAG_COMPLETION_MODEL || 'gpt-4.1' }}
          GRAPHRAG_COMPLETION_DEPLOYMENT_NAME: ${{ secrets.GRAPHRAG_COMPLETION_DEPLOYMENT_NAME || 'gpt-4.1' }}
          # --- Embedding model ---
          GRAPHRAG_EMBEDDING_MODEL: ${{ secrets.GRAPHRAG_EMBEDDING_MODEL || 'text-embedding-3-large' }}
          GRAPHRAG_EMBEDDING_DEPLOYMENT_NAME: ${{ secrets.GRAPHRAG_EMBEDDING_DEPLOYMENT_NAME || 'text-embedding-3-large' }}
          # --- Local storage paths ---
          GRAPHRAG_INPUT_BASE_DIR: ${{ secrets.GRAPHRAG_INPUT_BASE_DIR || 'input' }}
          GRAPHRAG_OUTPUT_BASE_DIR: ${{ secrets.GRAPHRAG_OUTPUT_BASE_DIR || 'output' }}
          GRAPHRAG_LOGS_BASE_DIR: ${{ secrets.GRAPHRAG_LOGS_BASE_DIR || 'logs' }}
          GRAPHRAG_CACHE_BASE_DIR: ${{ secrets.GRAPHRAG_CACHE_BASE_DIR || 'cache' }}
          GRAPHRAG_LANCEDB_URI: ${{ secrets.GRAPHRAG_LANCEDB_URI || 'output/lancedb' }}
          # --- Azure Blob Storage ---
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING || '' }}
          AZURE_STORAGE_ACCOUNT_URL: ${{ secrets.AZURE_STORAGE_ACCOUNT_URL || '' }}
          GRAPHRAG_BLOB_CONTAINER_INPUT: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_INPUT || 'graphrag-input' }}
          GRAPHRAG_BLOB_CONTAINER_OUTPUT: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_OUTPUT || 'graphrag-output' }}
          GRAPHRAG_BLOB_CONTAINER_LOGS: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_LOGS || 'graphrag-logs' }}
          GRAPHRAG_BLOB_CONTAINER_CACHE: ${{ secrets.GRAPHRAG_BLOB_CONTAINER_CACHE || 'graphrag-cache' }}
          # --- Azure CosmosDB ---
          COSMOSDB_CONNECTION_STRING: ${{ secrets.COSMOSDB_CONNECTION_STRING || '' }}
          COSMOSDB_URL: ${{ secrets.COSMOSDB_URL || '' }}
          COSMOSDB_ACCOUNT_URL: ${{ secrets.COSMOSDB_ACCOUNT_URL || '' }}
          GRAPHRAG_COSMOSDB_DATABASE: ${{ secrets.GRAPHRAG_COSMOSDB_DATABASE || 'graphrag' }}
          # --- Azure AI Search ---
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY || '' }}
          AZURE_SEARCH_URL: ${{ secrets.AZURE_SEARCH_URL || '' }}
          AZURE_SEARCH_AUDIENCE: ${{ secrets.AZURE_SEARCH_AUDIENCE || 'https://search.azure.com' }}
        run: uv run pytest tests/test_server_integration.py -v
